<?xml version='1.0' encoding='UTF-8'?>
<svg width='32' height='32' xmlns='http://www.w3.org/2000/svg'>
  <!-- CONSTRUKTR blue background -->
  <rect width='32' height='32' rx='6' fill='#0243D5'/>
  
  <!-- Hard hat icon centered -->
  <g transform='translate(16,16)'>
    <!-- White helmet dome -->
    <ellipse cx='0' cy='-2' rx='7' ry='6' fill='#ffffff' stroke='#0243D5' stroke-width='0.5'/>
    
    <!-- White helmet brim -->
    <rect x='-9' y='3' width='18' height='2.5' rx='1' fill='#ffffff' stroke='#0243D5' stroke-width='0.3'/>
    
    <!-- White Letter C -->
    <text x='0' y='2' font-family='Arial, sans-serif' font-size='10' font-weight='bold' fill='#ffffff' text-anchor='middle'>C</text>
  </g>
</svg>