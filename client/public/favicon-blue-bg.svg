<?xml version='1.0' encoding='UTF-8'?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- CONSTRUKTR blue background -->
  <rect width="32" height="32" rx="6" fill="#0243D5"/>
  
  <!-- White shield outline -->
  <path d="M16 4 L25 7.5 L25 18 Q25 22.5 16 27 Q7 22.5 7 18 L7 7.5 Z" 
        fill="#ffffff" stroke="#e5e5e5" stroke-width="0.3"/>
  
  <!-- Blue inner area for circuit pattern -->
  <path d="M16 6 L23 8.5 L23 17 Q23 20.5 16 24 Q9 20.5 9 17 L9 8.5 Z" 
        fill="#0243D5" stroke="#ffffff" stroke-width="0.2"/>
  
  <!-- White circuit pattern -->
  <g stroke="#ffffff" stroke-width="0.4" fill="none">
    <!-- Main circuit lines -->
    <line x1="12" y1="12" x2="20" y2="12"/>
    <line x1="13" y1="15" x2="19" y2="15"/>
    <line x1="14" y1="18" x2="18" y2="18"/>
    
    <!-- Central vertical -->
    <line x1="16" y1="10" x2="16" y2="20"/>
  </g>
  
  <!-- White circuit nodes -->
  <g fill="#ffffff">
    <circle cx="12" cy="12" r="0.5"/>
    <circle cx="20" cy="12" r="0.5"/>
    <circle cx="16" cy="15" r="0.8"/>
  </g>
  
  <!-- White Central C -->
  <text x="16" y="17" font-family="Arial, sans-serif" font-size="6" font-weight="bold" 
        fill="#ffffff" text-anchor="middle">C</text>
</svg>