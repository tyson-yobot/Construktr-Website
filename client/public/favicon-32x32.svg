<?xml version='1.0' encoding='UTF-8'?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield outline with correct CONSTRUKTR blue -->
  <path d="M16 3 L26 7 L26 20 Q26 25 16 29 Q6 25 6 20 L6 7 Z" 
        fill="#0243D5" stroke="#1a5490" stroke-width="0.5"/>
  
  <!-- Inner white area -->
  <path d="M16 5 L24 8 L24 19 Q24 23 16 26 Q8 23 8 19 L8 8 Z" 
        fill="#ffffff" stroke="#0243D5" stroke-width="0.3"/>
  
  <!-- Circuit pattern simplified for favicon -->
  <g stroke="#0243D5" stroke-width="0.4" fill="none">
    <!-- Main circuit lines -->
    <line x1="12" y1="12" x2="20" y2="12"/>
    <line x1="13" y1="15" x2="19" y2="15"/>
    <line x1="14" y1="18" x2="18" y2="18"/>
    
    <!-- Central vertical -->
    <line x1="16" y1="10" x2="16" y2="20"/>
  </g>
  
  <!-- Circuit nodes -->
  <g fill="#0243D5">
    <circle cx="12" cy="12" r="0.5"/>
    <circle cx="20" cy="12" r="0.5"/>
    <circle cx="16" cy="15" r="0.8"/>
  </g>
  
  <!-- Central C -->
  <text x="16" y="17" font-family="Arial, sans-serif" font-size="6" font-weight="bold" 
        fill="#0243D5" text-anchor="middle">C</text>
</svg>