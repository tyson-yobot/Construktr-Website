<?xml version='1.0' encoding='UTF-8'?>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield outline -->
  <path d="M200 20 L340 80 L340 200 Q340 300 200 380 Q60 300 60 200 L60 80 Z" 
        fill="#0243D5" stroke="#2c5aa0" stroke-width="3"/>
  
  <!-- Inner shield -->
  <path d="M200 40 L320 90 L320 190 Q320 270 200 340 Q80 270 80 190 L80 90 Z" 
        fill="#ffffff" stroke="#0243D5" stroke-width="2"/>
  
  <!-- Central circuit pattern -->
  <g transform="translate(200,180)">
    <!-- Central hub -->
    <circle cx="0" cy="0" r="25" fill="#0243D5" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Circuit lines -->
    <line x1="-60" y1="-40" x2="-30" y2="-20" stroke="#0243D5" stroke-width="3"/>
    <line x1="60" y1="-40" x2="30" y2="-20" stroke="#0243D5" stroke-width="3"/>
    <line x1="-60" y1="40" x2="-30" y2="20" stroke="#0243D5" stroke-width="3"/>
    <line x1="60" y1="40" x2="30" y2="20" stroke="#0243D5" stroke-width="3"/>
    
    <!-- Corner nodes -->
    <circle cx="-60" cy="-40" r="6" fill="#0243D5"/>
    <circle cx="60" cy="-40" r="6" fill="#0243D5"/>
    <circle cx="-60" cy="40" r="6" fill="#0243D5"/>
    <circle cx="60" cy="40" r="6" fill="#0243D5"/>
  </g>
  
  <!-- Letter C -->
  <text x="200" y="190" font-family="Arial, sans-serif" font-size="60" font-weight="bold" 
        fill="#ffffff" text-anchor="middle">C</text>
  
  <!-- CONSTRUKTR text -->
  <text x="200" y="320" font-family="Arial, sans-serif" font-size="24" font-weight="bold" 
        fill="#0243D5" text-anchor="middle">CONSTRUKTR</text>
  
  <!-- AI text -->
  <text x="280" y="190" font-family="Arial, sans-serif" font-size="20" font-weight="bold" 
        fill="#0243D5" text-anchor="middle">AI</text>
</svg>