<?xml version='1.0' encoding='UTF-8'?>
<svg width='192' height='192' xmlns='http://www.w3.org/2000/svg'>
  <!-- CONSTRUKTR blue background -->
  <rect width='192' height='192' rx='32' fill='#0243D5'/>
  
  <!-- Hard hat icon centered -->
  <g transform='translate(96,96)'>
    <!-- White helmet dome -->
    <ellipse cx='0' cy='-15' rx='45' ry='35' fill='#ffffff' stroke='#0243D5' stroke-width='2'/>
    
    <!-- White helmet brim -->
    <rect x='-55' y='20' width='110' height='15' rx='5' fill='#ffffff' stroke='#0243D5' stroke-width='1'/>
    
    <!-- White Letter C -->
    <text x='0' y='10' font-family='Arial, sans-serif' font-size='60' font-weight='bold' fill='#ffffff' text-anchor='middle'>C</text>
  </g>
</svg>