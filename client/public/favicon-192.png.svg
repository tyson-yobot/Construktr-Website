<?xml version='1.0' encoding='UTF-8'?>
<svg width='192' height='192' xmlns='http://www.w3.org/2000/svg'>
  <!-- Hard hat icon with transparent background for conversion to PNG -->
  <g transform='translate(96,96)'>
    <!-- Blue circle base -->
    <circle cx='0' cy='0' r='80' fill='#0d82da'/>
    
    <!-- Helmet dome -->
    <ellipse cx='0' cy='-15' rx='48' ry='40' fill='#0d82da' stroke='#ffffff' stroke-width='4'/>
    
    <!-- Helmet brim -->
    <rect x='-60' y='20' width='120' height='16' rx='4' fill='#0d82da' stroke='#ffffff' stroke-width='2'/>
    
    <!-- Letter C -->
    <text x='0' y='15' font-family='Arial, sans-serif' font-size='70' font-weight='bold' fill='#ffffff' text-anchor='middle'>C</text>
  </g>
</svg>