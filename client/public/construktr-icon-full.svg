<?xml version='1.0' encoding='UTF-8'?>
<svg width='1024' height='1024' xmlns='http://www.w3.org/2000/svg'>
  <!-- Navy background -->
  <rect width='1024' height='1024' fill='#0d243a'/>
  
  <!-- Blue circle -->
  <circle cx='512' cy='512' r='300' fill='#0d82da'/>
  
  <!-- Hard hat icon shape -->
  <g transform='translate(512,512)'>
    <!-- Helmet dome -->
    <ellipse cx='0' cy='-50' rx='150' ry='120' fill='#0d82da' stroke='#ffffff' stroke-width='8'/>
    
    <!-- Helmet brim -->
    <rect x='-180' y='30' width='360' height='40' rx='10' fill='#0d82da' stroke='#ffffff' stroke-width='8'/>
    
    <!-- Letter C -->
    <text x='0' y='20' font-family='Arial, sans-serif' font-size='280' font-weight='bold' fill='#ffffff' text-anchor='middle'>C</text>
  </g>
</svg>