<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Navy background -->
  <rect width="32" height="32" rx="6" fill="#0d243a"/>
  
  <!-- Hard hat icon scaled for favicon -->
  <g transform="translate(16,16)">
    <!-- Helmet dome -->
    <ellipse cx="0" cy="-2" rx="6" ry="5" fill="#0d82da" stroke="#ffffff" stroke-width="0.3"/>
    
    <!-- Helmet brim -->
    <rect x="-7" y="2" width="14" height="1.5" rx="0.4" fill="#0d82da" stroke="#ffffff" stroke-width="0.3"/>
    
    <!-- Letter C -->
    <text x="0" y="1" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">C</text>
  </g>
</svg>